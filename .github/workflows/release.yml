name: Release

# Triggers an npm publish with provenance whenever a `v*` tag is pushed.
# Required by n8n's verified community node policy (effective 2026-05-01):
# verified nodes must be published from a GitHub Actions workflow with an
# npm provenance statement, not from a local machine.
#
# Setup:
# 1. In npmjs.com, generate a Granular Access Token (NOT a classic publish
#    token) scoped to `@neosapience/n8n-nodes-typecast` with publish rights
#    AND "OIDC publishing" enabled. See
#    https://docs.npmjs.com/generating-provenance-statements for the exact
#    settings.
# 2. Add it to this repo's secrets as `NPM_TOKEN` (Settings → Secrets and
#    variables → Actions → New repository secret).
# 3. To release, bump the version in package.json + CHANGELOG, push to main,
#    then `git tag v<version>` and `git push origin v<version>`. This
#    workflow takes over from there.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  # id-token: write is required for npm to mint a provenance attestation
  # via OIDC. Without this, `npm publish --provenance` falls back to a
  # warning and verified-node submission will not pick up provenance.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Actions are pinned to immutable commit SHAs (not floating major tags)
      # so a hijacked or rotated tag in the upstream repo cannot silently
      # change what runs during a publish. The trailing `# v4.x.x` comment is
      # how Dependabot picks the line up for automated SHA refreshes.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        # Guards against a tag/package.json version drift: if someone pushes
        # `git tag v1.2.3` but package.json is still on 1.2.2, we want the
        # publish step to never run and the failure to surface immediately.
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "tag: $TAG_VERSION  package.json: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag $TAG_VERSION does not match package.json $PKG_VERSION"
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
