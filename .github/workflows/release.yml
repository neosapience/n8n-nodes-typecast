name: Release

# Triggers an npm publish with provenance whenever a `v*` tag is pushed.
# Required by n8n's verified community node policy (effective 2026-05-01):
# verified nodes must be published from a GitHub Actions workflow with an
# npm provenance statement, not from a local machine.
#
# Setup:
# 1. In npmjs.com, configure a Trusted Publisher for
#    `@neosapience/n8n-nodes-typecast`:
#    - Publisher: GitHub Actions
#    - Organization/user: neosapience
#    - Repository: n8n-nodes-typecast
#    - Workflow filename: release.yml
#    - Environment: leave empty unless this workflow is later given one
# 2. To release, bump the version in package.json + CHANGELOG, push to main,
#    then `git tag v<version>` and `git push origin v<version>`. This
#    workflow takes over from there.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  # id-token: write is required for npm to mint a provenance attestation
  # via OIDC. Without this, `npm publish --provenance` falls back to a
  # warning and verified-node submission will not pick up provenance.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Actions are pinned to immutable commit SHAs (not floating major tags)
      # so a hijacked or rotated tag in the upstream repo cannot silently
      # change what runs during a publish. The trailing `# v4.x.x` comment is
      # how Dependabot picks the line up for automated SHA refreshes.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Verify tag matches package version
        # Guards against a tag/package.json version drift: if someone pushes
        # `git tag v1.2.3` but package.json is still on 1.2.2, we want the
        # publish step to never run and the failure to surface immediately.
        # Runs before `npm ci` so a mismatch fails fast without installing.
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "tag: $TAG_VERSION  package.json: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag $TAG_VERSION does not match package.json $PKG_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
